<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clearing Sessions - Freecoino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0b0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #1a1b2e;
      border-top-color: #01D676;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #01D676;
    }
    p {
      color: #a9a9ca;
      line-height: 1.6;
    }
    .success {
      color: #01D676;
      font-weight: 600;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Security Update</h1>
    <p>Clearing old authentication sessions for improved security...</p>
    <p class="success" id="status">Please wait...</p>
  </div>

  <script>
    // Clear all old Supabase sessions
    (function() {
      const statusEl = document.getElementById('status');
      
      try {
        // Clear localStorage
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && (key.includes('supabase') || key.includes('auth'))) {
            keysToRemove.push(key);
          }
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
        
        // Clear sessionStorage
        sessionStorage.clear();
        
        statusEl.textContent = '✓ Sessions cleared successfully!';
        
        // Redirect to homepage after 2 seconds
        setTimeout(() => {
          window.location.href = '/auth/login';
        }, 2000);
        
      } catch (error) {
        console.error('Clear session error:', error);
        statusEl.textContent = 'Done! Redirecting...';
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
    })();
  </script>
</body>
</html>
